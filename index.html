<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portale B2B - AltraQualità</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand: #B71E42; /* Cambia questo codice con il colore esatto se necessario */
            --brand-hover: #8f1733;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-brand { background-color: var(--brand) !important; }
        .text-brand { color: var(--brand) !important; }
        .btn-brand { background-color: var(--brand); color: white; border: none; }
        .btn-brand:hover { background-color: var(--brand-hover); color: white; }
        
        #auth-section, #app-section { display: none; }
        
        /* Sticky Cart Bar */
        #cart-sticky-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; border-top: 2px solid var(--brand);
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 1000;
            padding: 15px 20px; display: none; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <!-- 1. SEZIONE LOGIN -->
    <div id="auth-section" class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0" style="border-top: 5px solid var(--brand);">
                    <div class="card-body p-5 text-center">
                        <h2 class="fw-bold mb-4 text-brand">Portale B2B</h2>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="login-email" placeholder="name@example.com">
                            <label for="login-email">Indirizzo Email</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="login-password" placeholder="Password">
                            <label for="login-password">Password</label>
                        </div>
                        <button class="btn btn-brand w-100 py-3 fw-bold" onclick="effettuaLogin()">Accedi al Portale</button>
                        <div id="auth-error" class="text-danger mt-3 fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. SEZIONE APP (DASHBOARD) -->
    <div id="app-section">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-white" href="#" onclick="caricaCampagne()">AltraQualità B2B</a>
                
                <div class="d-flex align-items-center ms-auto">
                    <span class="text-light me-2 small d-none d-md-inline">Stai ordinando per:</span>
                    <select id="global-bottega-select" class="form-select form-select-sm fw-bold me-3" style="width: auto; max-width: 250px;" onchange="cambioBottegaGlobal()">
                        <!-- Popolato dinamicamente -->
                    </select>
                    
                    <button class="btn btn-outline-light btn-sm fw-bold me-2" id="nav-fornitori" onclick="caricaCampagne()">Vetrina Preordini</button>
                    <button class="btn btn-outline-danger btn-sm fw-bold" onclick="effettuaLogout()">Esci</button>
                </div>
            </div>
        </nav>

        <!-- Area Contenuto Principale -->
        <div class="container mt-4 mb-5 pb-5">
            <div class="row">
                <div class="col-12" id="app-container">
                    <!-- Contenuto dinamico -->
                </div>
            </div>
        </div>

        <!-- Sticky Cart Bar -->
        <div id="cart-sticky-bar">
            <div>
                <span class="text-muted fw-bold d-block small mb-1">Totale Carrello (Tutte le categorie)</span>
                <h4 class="mb-0 fw-bold text-brand" id="sticky-cart-total">€ 0,00</h4>
            </div>
            <button class="btn btn-dark btn-lg fw-bold px-4 shadow-sm" onclick="mostraRiepilogoCarrello()">
                🛒 Vai al Riepilogo
            </button>
        </div>
    </div>

    <!-- SCRIPT PRINCIPALE -->
    <script>
        /* ==========================================
           CONFIGURAZIONE DATABASE E STATO GLOBALE
           ========================================== */
        const SUPABASE_URL = 'https://tmaxqbosibkxrghgwfzi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtYXhxYm9zaWJreHJnaGd3ZnppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODA2MjUsImV4cCI6MjA5OTk1NjYyNX0.xMVQd7yHyUuoCyH1JajJttYRNR5qhEy_W6TsMcDgJA0';
        const clientDB = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const AppState = {
            user: null,
            botteghe: [],
            categorieCache: [], 
            carrello: [] 
        };

        /* ==========================================
           AUTENTICAZIONE E INIZIALIZZAZIONE
           ========================================== */
        window.onload = checkSession;

        async function checkSession() {
            const { data: { session } } = await clientDB.auth.getSession();
            if (session) {
                await caricaProfiloUtente(session.user);
            } else {
                cambiaVista('auth-section');
            }
        }

        async function effettuaLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errDiv = document.getElementById('auth-error');
            errDiv.innerText = 'Accesso in corso...';

            const { data, error } = await clientDB.auth.signInWithPassword({ email, password });
            if (error) { errDiv.innerText = "Errore: " + error.message; return; }
            await caricaProfiloUtente(data.user);
        }

        async function caricaProfiloUtente(userAuth) {
            let { data: cliente, error } = await clientDB.from('clienti').select('*').eq('email', userAuth.email).single();
            if (error || !cliente) {
                alert("Anagrafica cliente non trovata. Contatta l'amministrazione.");
                effettuaLogout();
                return;
            }
            
            AppState.user = { id: cliente.id, email: userAuth.email, ragione_sociale: cliente.ragione_sociale };
            
            let { data: botteghe } = await clientDB.from('botteghe').select('*').eq('id_cliente', cliente.id).order('nome_bottega');
            AppState.botteghe = botteghe || [];
            
            popolaSelettoreBotteghe();
            cambiaVista('app-section');
            caricaCampagne();
        }

        async function effettuaLogout() {
            await clientDB.auth.signOut();
            AppState.user = null;
            AppState.carrello = [];
            cambiaVista('auth-section');
        }

        function cambiaVista(idVista) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('cart-sticky-bar').style.display = 'none';
            document.getElementById(idVista).style.display = 'block';
            if(idVista === 'app-section') document.getElementById('cart-sticky-bar').style.display = 'flex';
        }

        function popolaSelettoreBotteghe() {
            const select = document.getElementById('global-bottega-select');
            select.innerHTML = '';
            AppState.botteghe.forEach(b => {
                select.innerHTML += `<option value="${b.id_bottega}">${b.nome_bottega} (${b.comune})</option>`;
            });
        }

        function cambioBottegaGlobal() {
            const vistaAttuale = document.querySelector('#app-container h3')?.innerText || '';
            if(!vistaAttuale.includes('Preordini') && !vistaAttuale.includes('Categoria') && !vistaAttuale.includes('Riepilogo')) {
                // Ricarica la vista principale per aggiornare le quantità
                caricaCampagne();
            }
        }

        /* ==========================================
           NAVIGAZIONE A 4 LIVELLI
           ========================================== */

        // 1. CAMPAGNE
        async function caricaCampagne() {
            const app = document.getElementById('app-container');
            app.innerHTML = '<div class="spinner-border text-brand mx-auto mt-5"></div><p class="text-muted mt-3 fw-bold">Caricamento preordini attivi...</p>';
            
            const { data: campagne, error } = await clientDB.from('campagne').select('*').order('id_campagna');
            if (error) { app.innerHTML = `<p class="text-danger fw-bold">Errore: ${error.message}</p>`; return; }
            
            let html = `
            <div class="col-12 mb-4 text-start">
                <h2 class="fw-bold text-brand">Preordini Aperti</h2>
                <p class="text-muted fs-6">Benvenuto <strong>${AppState.user.ragione_sociale}</strong>. Seleziona una campagna per iniziare l'ordine.</p>
            </div>`;
            
            campagne.forEach(c => {
                html += `
                <div class="col-12 mb-4 text-start">
                    <div class="card shadow-sm border-0 bg-dark text-white overflow-hidden" style="border-radius: 15px; cursor: pointer; transition: transform 0.2s;" onclick="apriCampagna(${c.id_campagna}, '${c.nome_campagna}')" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body p-5 d-flex flex-column justify-content-center" style="background: linear-gradient(135deg, var(--brand) 0%, #4a1525 100%); min-height: 160px;">
                            <h3 class="card-title fw-bold mb-2">📦 ${c.nome_campagna}</h3>
                            <p class="card-text opacity-75">Clicca per entrare e visualizzare le categorie di prodotto.</p>
                        </div>
                    </div>
                </div>`;
            });
            
            app.innerHTML = html;
            aggiornaBarraStickyCarrello();
            document.getElementById('cart-sticky-bar').style.display = 'flex';
        }

        // 2. CATEGORIE
        async function apriCampagna(idCampagna, nomeCampagna) {
            const app = document.getElementById('app-container');
            app.innerHTML = '<div class="spinner-border text-brand mx-auto mt-5"></div>';

            const { data: categorie, error } = await clientDB.from('categorie').select('*').eq('id_campagna', idCampagna).order('nome_categoria');
            if (error) { app.innerHTML = `<p class="text-danger fw-bold">Errore: ${error.message}</p>`; return; }
            
            categorie.forEach(c => {
                if(!AppState.categorieCache.find(cat => cat.id_categoria === c.id_categoria)){
                    AppState.categorieCache.push(c);
                }
            });

            let html = `
            <div class="col-12 mb-4 text-start">
                <button class="btn btn-outline-secondary btn-sm mb-3 fw-bold" onclick="caricaCampagne()">← Torna ai Preordini</button>
                <h3 class="fw-bold text-brand">${nomeCampagna}</h3>
                <p class="text-muted">I minimi d'ordine sono calcolati sul totale della categoria per l'intera organizzazione.</p>
            </div>`;
            
            categorie.forEach(cat => {
                const totCategoria = calcolaTotaleCarrelloPerCategoria(cat.id_categoria);
                const perc = Math.min((totCategoria / cat.minimo_ordine) * 100, 100);
                const coloreBarra = perc >= 100 ? 'bg-success' : 'bg-warning text-dark';

                html += `
                <div class="col-md-6 mb-4 text-start">
                    <div class="card shadow-sm h-100 border-0 p-3" style="cursor: pointer; transition: transform 0.2s;" onclick="apriCategoria(${cat.id_categoria}, '${cat.nome_categoria.replace("'", "\\'")}', ${cat.minimo_ordine}, ${idCampagna}, '${nomeCampagna.replace("'", "\\'")}')" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='translateY(0)'">
                        <div class="card-body d-flex flex-column">
                            <h4 class="fw-bold text-dark mb-2">📁 ${cat.nome_categoria}</h4>
                            <p class="text-muted small mb-3">Minimo organizzazione: <strong>€ ${cat.minimo_ordine.toFixed(2)}</strong></p>
                            <div class="mt-auto">
                                <div class="d-flex justify-content-between small fw-bold mb-1">
                                    <span>Progresso (tutte le botteghe):</span>
                                    <span>€ ${totCategoria.toFixed(2)} / € ${cat.minimo_ordine.toFixed(2)}</span>
                                </div>
                                <div class="progress" style="height: 12px; border-radius: 10px;">
                                    <div class="progress-bar ${coloreBarra} progress-bar-striped progress-bar-animated" style="width: ${perc}%;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        // 3. PRODUTTORI
        async function apriCategoria(idCategoria, nomeCategoria, minimoOrdine, idCampagna, nomeCampagna) {
            const app = document.getElementById('app-container');
            app.innerHTML = '<div class="spinner-border text-brand mx-auto mt-5"></div>';

            const { data: produttori, error } = await clientDB.from('produttori').select('*').eq('id_categoria', idCategoria).order('nome_produttore');
            if (error) { app.innerHTML = `<p class="text-danger fw-bold">Errore: ${error.message}</p>`; return; }
            
            let html = `
            <div class="col-12 mb-4 text-start">
                <button class="btn btn-outline-secondary btn-sm mb-3 fw-bold" onclick="apriCampagna(${idCampagna}, '${nomeCampagna.replace("'", "\\'")}')">← Torna a Categorie</button>
                <div class="d-flex justify-content-between align-items-center flex-wrap">
                    <h3 class="fw-bold text-brand mb-0">Categoria: ${nomeCategoria}</h3>
                    <div class="p-2 bg-light rounded border">
                        <span class="small text-muted fw-bold d-block">Stato Minimo:</span>
                        <span class="badge ${calcolaTotaleCarrelloPerCategoria(idCategoria) >= minimoOrdine ? 'bg-success' : 'bg-warning text-dark'} fs-6">
                            € ${calcolaTotaleCarrelloPerCategoria(idCategoria).toFixed(2)} / € ${minimoOrdine.toFixed(2)}
                        </span>
                    </div>
                </div>
            </div>`;
            
            produttori.forEach(p => {
                html += `
                <div class="col-md-4 mb-4 text-start">
                    <div class="card shadow-sm h-100 border-0" style="border-left: 5px solid var(--brand) !important; cursor: pointer;" onclick="apriCatalogoProduttore(${p.id_produttore}, '${p.nome_produttore.replace("'", "\\'")}', '${nomeCategoria.replace("'", "\\'")}', ${idCategoria}, ${minimoOrdine}, ${idCampagna}, '${nomeCampagna.replace("'", "\\'")}')">
                        <div class="card-body p-4">
                            <h5 class="fw-bold text-dark mb-0">🤝 ${p.nome_produttore}</h5>
                            <span class="text-muted small">Visualizza e ordina articoli</span>
                        </div>
                    </div>
                </div>`;
            });
            app.innerHTML = html;
        }

        // 4. CATALOGO
        async function apriCatalogoProduttore(idProduttore, nomeProduttore, nomeCategoria, idCategoria, minimoOrdine, idCampagna, nomeCampagna) {
            const app = document.getElementById('app-container');
            app.innerHTML = '<div class="spinner-border text-brand mx-auto mt-5"></div><p class="text-muted mt-2">Caricamento articoli...</p>';

            const { data: prodotti, error } = await clientDB.from('prodotti').select('*').eq('id_produttore', idProduttore).order('nome');
            if (error) { app.innerHTML = `<p class="text-danger fw-bold">Errore: ${error.message}</p>`; return; }
            
            let html = `
            <div class="col-12 mb-4 text-start">
                <button class="btn btn-outline-secondary btn-sm mb-3 fw-bold" onclick="apriCategoria(${idCategoria}, '${nomeCategoria.replace("'", "\\'")}', ${minimoOrdine}, ${idCampagna}, '${nomeCampagna.replace("'", "\\'")}')">← Torna ai Produttori</button>
                <h3 class="fw-bold text-brand">${nomeProduttore}</h3>
                <p class="text-muted">Inserisci le quantità per la bottega selezionata in alto.</p>
            </div>
            <div class="col-12 text-start">
                <div class="table-responsive bg-white p-3 rounded shadow-sm">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Codice</th>
                                <th>Articolo</th>
                                <th class="text-end">Prezzo Netto</th>
                                <th class="text-center" style="width: 140px;">Quantità</th>
                            </tr>
                        </thead>
                        <tbody>`;

            prodotti.forEach(p => {
                const idBottegaCorrente = document.getElementById('global-bottega-select').value;
                const item = AppState.carrello.find(i => i.codice_articolo === p.codice_articolo && i.id_bottega == idBottegaCorrente);
                const qta = item ? item.quantita : 0;

                html += `
                <tr>
                    <td class="fw-bold text-muted small">${p.codice_articolo}</td>
                    <td>
                        <div class="fw-bold text-dark">${p.nome}</div>
                        <div class="text-muted small" style="max-width: 400px;">${p.descrizione || ''}</div>
                    </td>
                    <td class="text-end fw-bold text-brand">€ ${p.prezzo_netto.toFixed(2)}</td>
                    <td>
                        <input type="number" class="form-control text-center fw-bold border-secondary" 
                               min="0" value="${qta}" 
                               onchange="aggiornaQuantita('${p.codice_articolo}', '${p.nome.replace("'", "\\'")}', this.value, ${p.prezzo_netto}, ${idCategoria}, ${idProduttore})">
                    </td>
                </tr>`;
            });

            html += `</tbody></table></div></div>`;
            app.innerHTML = html;
        }

        /* ==========================================
           LOGICA CARRELLO E CHECKOUT
           ========================================== */

        function aggiornaQuantita(codice, nome, qta, prezzoNetto, idCategoria, idProduttore) {
            const idBottega = document.getElementById('global-bottega-select').value;
            const quantita = parseInt(qta) || 0;
            const index = AppState.carrello.findIndex(i => i.codice_articolo === codice && i.id_bottega == idBottega);

            if (quantita <= 0) {
                if (index > -1) AppState.carrello.splice(index, 1);
            } else {
                if (index > -1) {
                    AppState.carrello[index].quantita = quantita;
                } else {
                    AppState.carrello.push({
                        codice_articolo: codice, nome: nome, id_bottega: idBottega, 
                        id_categoria: idCategoria, id_produttore: idProduttore,
                        quantita: quantita, prezzo_unitario_applicato: prezzoNetto
                    });
                }
            }
            aggiornaBarraStickyCarrello();
        }

        function calcolaTotaleCarrelloPerCategoria(idCategoria) {
            return AppState.carrello
                .filter(i => i.id_categoria == idCategoria)
                .reduce((sum, i) => sum + (i.quantita * i.prezzo_unitario_applicato), 0);
        }

        function aggiornaBarraStickyCarrello() {
            const totaleGlobale = AppState.carrello.reduce((sum, i) => sum + (i.quantita * i.prezzo_unitario_applicato), 0);
            document.getElementById('sticky-cart-total').innerText = '€ ' + totaleGlobale.toFixed(2);
        }

        function mostraRiepilogoCarrello() {
            const app = document.getElementById('app-container');
            
            if(AppState.carrello.length === 0) {
                app.innerHTML = `
                <div class="col-12 text-center mt-5">
                    <h3 class="text-muted fw-bold">Il carrello è vuoto</h3>
                    <button class="btn btn-brand mt-3" onclick="caricaCampagne()">Inizia ad ordinare</button>
                </div>`;
                return;
            }

            const categorieNelCarrello = [...new Set(AppState.carrello.map(i => i.id_categoria))];
            
            let html = `
            <div class="col-12 mb-4 text-start">
                <button class="btn btn-outline-secondary btn-sm mb-3 fw-bold" onclick="caricaCampagne()">← Torna ai Preordini</button>
                <h2 class="fw-bold text-brand">Riepilogo Ordine Generale</h2>
                <p class="text-muted">Verifica i minimi d'ordine per ogni categoria. Il sistema ti permetterà di inviare l'ordine solo per le categorie completate.</p>
            </div>`;

            let tuttoSuperato = true;

            categorieNelCarrello.forEach(idCat => {
                const infoCat = AppState.categorieCache.find(c => c.id_categoria == idCat) || {nome_categoria: 'Sconosciuta', minimo_ordine: 0};
                const totaleCat = calcolaTotaleCarrelloPerCategoria(idCat);
                const minimoSuperato = totaleCat >= infoCat.minimo_ordine;
                if(!minimoSuperato) tuttoSuperato = false;

                const badgeStato = minimoSuperato 
                    ? `<span class="badge bg-success fs-6">Minimo Raggiunto (✓)</span>` 
                    : `<span class="badge bg-danger fs-6">Mancano € ${(infoCat.minimo_ordine - totaleCat).toFixed(2)} al minimo</span>`;

                html += `
                <div class="col-12 mb-4 text-start">
                    <div class="card shadow-sm border-0 border-top border-4 ${minimoSuperato ? 'border-success' : 'border-danger'}">
                        <div class="card-header bg-white p-3 d-flex justify-content-between align-items-center">
                            <h4 class="fw-bold mb-0">${infoCat.nome_categoria}</h4>
                            <div class="text-end">
                                <span class="d-block fw-bold fs-5">Totale: € ${totaleCat.toFixed(2)}</span>
                                ${badgeStato}
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-sm table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Bottega Destinazione</th>
                                        <th>Codice</th>
                                        <th>Articolo</th>
                                        <th class="text-center">Q.tà</th>
                                        <th class="text-end pe-3">Subtotale</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                
                const vociCat = AppState.carrello.filter(i => i.id_categoria == idCat);
                vociCat.forEach(v => {
                    const nomeBottega = AppState.botteghe.find(b => b.id_bottega == v.id_bottega)?.nome_bottega || 'Bottega Sconosciuta';
                    const subtotale = v.quantita * v.prezzo_unitario_applicato;
                    
                    html += `
                                    <tr>
                                        <td class="ps-3 fw-bold text-secondary">${nomeBottega}</td>
                                        <td class="text-muted small">${v.codice_articolo}</td>
                                        <td>${v.nome}</td>
                                        <td class="text-center fw-bold">${v.quantita}</td>
                                        <td class="text-end pe-3 text-brand fw-bold">€ ${subtotale.toFixed(2)}</td>
                                    </tr>`;
                });

                html += `</tbody></table></div></div></div>`;
            });

            html += `
            <div class="col-12 text-end mt-4 bg-white p-4 rounded shadow-sm">
                <h3 class="fw-bold mb-3">Totale complessivo: <span class="text-brand" id="grand-total">${document.getElementById('sticky-cart-total').innerText}</span></h3>
                ${tuttoSuperato 
                    ? `<button class="btn btn-success btn-lg fw-bold px-5" onclick="inviaOrdine()">Conferma e Invia Ordine Definitivo</button>`
                    : `<button class="btn btn-secondary btn-lg fw-bold px-5" disabled>Raggiungi i minimi per confermare</button>
                       <p class="text-danger mt-2 fw-bold small">Attenzione: devi raggiungere il minimo d'ordine in tutte le categorie nel carrello per poter inviare.</p>`
                }
            </div>`;

            app.innerHTML = html;
        }

        async function inviaOrdine() {
            if(!confirm("Sei sicuro di voler inviare l'ordine definitivo ad AltraQualità?")) return;
            alert("✅ Ordine inviato con successo ad AltraQualità! Riceverai una mail di conferma.");
            AppState.carrello = [];
            document.getElementById('cart-sticky-bar').style.display = 'none';
