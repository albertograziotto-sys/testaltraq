<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altraqualità B2B - Portale Preordini</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Custom -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Navbar Base -->
    <nav class="navbar navbar-expand-lg navbar-dark brand-bg-color shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Altraqualità B2B</a>
            <div id="user-info" class="text-white d-none">
                <span id="user-email" class="me-3"></span>
                <button id="btn-logout" class="btn btn-sm btn-outline-light">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Contenitore Principale SPA -->
    <div id="app" class="container mt-4">
        <div class="text-center mt-5">
            <div class="spinner-border text-brand" role="status">
                <span class="visually-hidden">Caricamento...</span>
            </div>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Logica Custom -->
    <script src="app.js"></script>
</body>
</html>
