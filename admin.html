<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltraQualità - Pannello Admin B2B</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --altraq-brand: #f56f11;
            --altraq-hover: #d45e0d;
        }

        body { 
            background-color: #f8f9fa; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .d-none { display: none !important; }

        /* Classi utility Brand AltraQualità */
        .brand-bg-color {
            background-color: var(--altraq-brand) !important;
        }

        .text-brand {
            color: var(--altraq-brand) !important;
        }

        .btn-brand {
            background-color: var(--altraq-brand);
            color: white;
            border: none;
        }

        .btn-brand:hover {
            background-color: var(--altraq-hover);
            color: white;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--altraq-brand);
            box-shadow: 0 0 0 0.25rem rgba(245, 111, 17, 0.25);
        }
    </style>
</head>
<body>

    <!-- Navbar Brand -->
    <nav class="navbar navbar-expand-lg navbar-dark brand-bg-color mb-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">📦 AltraQualità | Gestione Ordini Staff</a>
            <div class="d-flex align-items-center d-none" id="user-menu">
                <span class="navbar-text text-white me-3 fw-semibold" id="admin-email"></span>
                <button class="btn btn-outline-light btn-sm fw-bold" id="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <!-- SEZIONE 1: LOGIN -->
        <div id="login-section" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm mt-5 border-0">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center mb-4 fw-bold text-brand">Accesso Staff AltraQualità</h4>
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email Staff</label>
                                <input type="email" id="email" class="form-control" placeholder="nome@altraqualita.it" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-brand w-100 py-2 fw-bold">Accedi alla Dashboard</button>
                        </form>
                        <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SEZIONE 2: DASHBOARD ORDINI -->
        <div id="dashboard-section" class="d-none">
            
            <!-- Header Dashboard & Filtri -->
            <div class="row mb-4 align-items-end g-3">
                <div class="col-md-3">
                    <h2 class="mb-0 fw-bold">Ordini in Ingresso</h2>
                    <p class="text-muted small mb-0">Preordini B2B da elaborare</p>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold">Cerca Cliente o Bottega</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" id="search-cliente" class="form-control" placeholder="Ragione sociale o bottega...">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">Filtra Modulo</label>
                    <select id="filter-categoria" class="form-select">
                        <option value="">Tutti i moduli</option>
                    </select>
                </div>
                <div class="col-md-4 text-end">
                    <div class="btn-group w-100" role="group">
                        <button id="btn-export-summary" class="btn btn-outline-dark btn-sm fw-bold" title="Esporta totale pezzi per codice articolo (per il fornitore)">
                            <i class="bi bi-calculator"></i> Totali Fornitore
                        </button>
                        <button id="btn-export-csv" class="btn btn-success btn-sm fw-bold" title="Esporta il dettaglio ordine per ogni singola bottega">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Dettaglio Botteghe
                        </button>
                        <button id="btn-mark-downloaded" class="btn btn-brand btn-sm fw-bold" title="Segna come presi in carico su Supabase">
                            <i class="bi bi-check2-all"></i> Presi in Carico
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabella Ordini -->
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="select-all" class="form-check-input"></th>
                                    <th>Data Ordine</th>
                                    <th>Cliente</th>
                                    <th>Bottega / Destinazione</th>
                                    <th>Modulo d'Ordine</th>
                                    <th>Stato</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <!-- Popolato dinamicamente da admin.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div> <!-- Fine Dashboard -->

    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Custom Logic -->
    <script src="admin.js"></script>
</body>
</html>
